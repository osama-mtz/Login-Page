<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Register Account Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h2 class="Logo"><img src="Logo.png" alt="Logo"></h2>
        <nav>
            <a href="#Home">Home</a>
            <a href="#About">About</a>
            <a href="#Services">Services</a>
            <a href="#Contact">Contact</a>
        </nav>
        <button class="navlogin">Login</button>
    </header>

    <div class="container">
        <span class="closeicon"><ion-icon name="close-outline"></ion-icon></span>

        <div class="loginbox">
            <h2>Login</h2>
            <form action="#">
                <div class="inputbox">
                    <span class="icon"><ion-icon name="mail-outline"></ion-icon></span>
                    <input type="email" required>
                    <label>Email</label>
                </div>

                <div class="inputbox">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>

                <div class="rememberbtn">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forget Password</a>
                </div>

                <button type="submit" class="Login">Login</button>

                <div class="register">
                    <p>Don't have an account? <a href="#" class="register-link">Register</a></p>
                </div>
            </form>
        </div>

        <div class="Registerbox">
            <h2>Registration</h2>
            <form action="#">
                <div class="inputbox">
                    <span class="icon"><ion-icon name="person"></ion-icon></span>
                    <input type="text" required>
                    <label>Username</label>
                </div>

                <div class="inputbox">
                    <span class="icon"><ion-icon name="mail-outline"></ion-icon></span>
                    <input type="email" required>
                    <label>Email</label>
                </div>

                <div class="inputbox">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>

                <div class="rememberbtn">
                    <label><input type="checkbox">I agree to the Terms & Conditions</label>
                </div>

                <button type="submit" class="Login">Register</button>

                <div class="register">
                    <p>Already have an account? <a href="#" class="register-link">Login</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
<script src="script.js"></script>
<script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
</html>
